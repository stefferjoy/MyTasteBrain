name: taste_memory_ai
description: A Flutter app that learns your food preferences and suggests recipes based on your saved recipes and available ingredients.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_genai_speech_recognition: ^0.1.0
  flutter_gemma: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
